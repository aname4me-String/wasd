services:
  couchbase:
    image: couchbase:community
    environment:
      COUCHBASE_ADMINISTRATOR_USERNAME: ${COUCHBASE_USER}
      COUCHBASE_ADMINISTRATOR_PASSWORD: ${COUCHBASE_PASSWORD}
    ports:
      - "${COUCHBASE_PORT:-8091}:8091"
      - "8092:8092"
      - "8093:8093"
      - "8094:8094"
      - "11210:11210"
    volumes:
      - ./couchbase-data:/opt/couchbase/var
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8091/pools || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - wasd_db

  backend:
    build:
      context: ../backend/
      dockerfile: ../docker/backend.DOCKERFILE
    environment:
      COUCHBASE_CONNECTION_STRING: couchbase://couchbase
      COUCHBASE_USERNAME: ${COUCHBASE_USER}
      COUCHBASE_PASSWORD: ${COUCHBASE_PASSWORD}
      COUCHBASE_BUCKET: ${COUCHBASE_BUCKET}
      SERVER_PORT: "8080"
    expose:
      - "8080"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      couchbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8080/actuator/health/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - wasd_db
      - wasd_app

  frontend:
    build:
      context: ../frontend/
      dockerfile: ../docker/frontend.DOCKERFILE
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wasd_app

networks:
  wasd_db:
    driver: bridge
  wasd_app:
    driver: bridge
