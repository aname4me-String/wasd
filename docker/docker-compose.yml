services:
  couchbase:
    image: couchbase:community
    environment:
      COUCHBASE_ADMINISTRATOR_USERNAME: ${COUCHBASE_USER}
      COUCHBASE_ADMINISTRATOR_PASSWORD: ${COUCHBASE_PASSWORD}
    ports:
      - "${COUCHBASE_PORT:-8091}:8091"
      - "8092:8092"
      - "8093:8093"
      - "8094:8094"
      - "11210:11210"
    volumes:
      - ./couchbase-data:/opt/couchbase/var
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8091/pools || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - wasd_db

  couchbase-init:
    image: couchbase:community
    depends_on:
      couchbase:
        condition: service_healthy
    environment:
      COUCHBASE_USER: ${COUCHBASE_USER}
      COUCHBASE_PASSWORD: ${COUCHBASE_PASSWORD}
      COUCHBASE_BUCKET: ${COUCHBASE_BUCKET}
    entrypoint: ["/bin/sh", "-ec"]
    command: >
      until curl --fail --silent http://couchbase:8091/pools >/dev/null; do sleep 2; done;
      if ! curl --fail --silent --user "$${COUCHBASE_USER}:$${COUCHBASE_PASSWORD}" http://couchbase:8091/pools/default >/dev/null; then
        couchbase-cli cluster-init -c couchbase:8091
        --cluster-username "$${COUCHBASE_USER}"
        --cluster-password "$${COUCHBASE_PASSWORD}"
        --services data,index,query
        --cluster-ramsize 512
        --cluster-index-ramsize 256;
      fi;
      until curl --fail --silent --user "$${COUCHBASE_USER}:$${COUCHBASE_PASSWORD}" http://couchbase:8091/pools/default >/dev/null; do sleep 2; done;
      if ! couchbase-cli bucket-list -c couchbase:8091 -u "$${COUCHBASE_USER}" -p "$${COUCHBASE_PASSWORD}" | grep -Fxq "$${COUCHBASE_BUCKET}"; then
        couchbase-cli bucket-create -c couchbase:8091
        -u "$${COUCHBASE_USER}" -p "$${COUCHBASE_PASSWORD}"
        --bucket "$${COUCHBASE_BUCKET}"
        --bucket-type couchbase
        --bucket-ramsize 256
        --wait;
      fi
    restart: "no"
    networks:
      - wasd_db

  backend:
    build:
      context: ../backend/
      dockerfile: ../docker/backend.DOCKERFILE
    environment:
      COUCHBASE_CONNECTION_STRING: couchbase://couchbase
      COUCHBASE_USERNAME: ${COUCHBASE_USER}
      COUCHBASE_PASSWORD: ${COUCHBASE_PASSWORD}
      COUCHBASE_BUCKET: ${COUCHBASE_BUCKET}
      SERVER_PORT: "8080"
    expose:
      - "8080"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      couchbase-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8080/actuator/health/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - wasd_db
      - wasd_app

  frontend:
    build:
      context: ../frontend/
      dockerfile: ../docker/frontend.DOCKERFILE
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wasd_app

networks:
  wasd_db:
    driver: bridge
  wasd_app:
    driver: bridge
